<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ocular Drift Transforms Retinal Encoding</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }, svg: { fontCache: 'global' } };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
    body { font-family: 'Inter', sans-serif; overflow-x: hidden; }

    .nav-button { transition: all 0.3s ease; }
    .nav-button:disabled { cursor: not-allowed; opacity: 0.5; }

    .content-section { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }

    .sim-canvas { border-radius: 0.75rem; max-width: 100%; height: auto; image-rendering: pixelated; background-color: #f7f7f7; }

    #canvas-trajectory {
      background-image: url('https://placehold.co/256x256/000000/FFFFFF?text=Scene');
      background-size: cover; background-position: center; border: 2px solid #a855f7;
    }
    
    /* Ensure the sticky sidebar doesn't exceed viewport height if content grows */
    .sticky-sidebar {
      max-height: calc(100vh - 4rem);
      overflow-y: auto;
      scrollbar-width: thin;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">

    <header class="text-center py-10 bg-white shadow-lg rounded-2xl mb-8">
      <h1 class="text-4xl sm:text-5xl font-extrabold text-indigo-700 leading-tight">
        Ocular Drift Transforms Retinal Encoding
      </h1>
      <p class="mt-2 text-xl text-gray-600">Interactive Walkthrough & Live Drift Simulation</p>
      <p class="mt-4 text-sm text-gray-500 italic">(Dennis Perez, Alexander Belsten, and Jacob Yates)</p>
    </header>

    <div class="grid lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-1">
        <div class="sticky top-8 space-y-6 sticky-sidebar">
          
          <div id="step-tracker" class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-bold mb-4 text-gray-900 border-b pb-2">Narrative Steps</h2>
            <div id="nav-buttons" class="space-y-3"></div>
          </div>

          <div id="simulation-controls" class="bg-white p-6 rounded-2xl shadow-xl border border-indigo-100 hidden">
            <h3 class="text-xl font-bold text-indigo-600 mb-4">Simulation Controls</h3>

            <div id="control-drift-speed" class="hidden">
              <label for="drift-speed" class="block text-sm font-medium text-gray-700">Ocular Drift Speed ($\mu$)</label>
              <input type="range" id="drift-speed" min="0" max="10" value="2" step="0.1" class="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
              <span id="drift-speed-value" class="text-sm font-mono text-gray-600 mt-1 block">2.0 px/frame</span>
            </div>

            <div id="control-noise-alpha" class="mt-4 hidden">
              <label for="noise-alpha" class="block text-sm font-medium text-gray-700">Image Structure ($\alpha$)</label>
              <input type="range" id="noise-alpha" min="0.5" max="3.0" value="2.0" step="0.1" class="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
              <span id="noise-alpha-value" class="text-sm font-mono text-gray-600 mt-1 block">2.0</span>
            </div>

            <div id="control-diffusion-D" class="mt-4 hidden">
              <label for="diffusion-d" class="block text-sm font-medium text-gray-700">Diffusion Constant ($D$)</label>
              <input type="range" id="diffusion-d" min="0.1" max="20" value="5" step="0.1" class="w-full h-2 bg-purple-100 rounded-lg appearance-none cursor-pointer accent-purple-600">
              <span id="diffusion-d-value" class="text-sm font-mono text-gray-600 mt-1 block">5.0</span>
            </div>

            <p id="control-tip" class="text-xs text-gray-500 mt-4 p-2 bg-yellow-50 rounded border border-yellow-100"></p>
          </div>
        </div>
      </div>

      <div class="lg:col-span-2">
        <div class="bg-white p-8 rounded-2xl shadow-xl min-h-[600px] border border-gray-100">
          <h2 id="content-title" class="text-3xl font-bold text-gray-900 mb-6 border-l-4 border-indigo-600 pl-4">Start Here</h2>

          <div id="content-display" class="space-y-6 content-section text-lg text-gray-700 leading-relaxed">
            </div>

          <div id="visualization-panel" class="mt-12 pt-8 border-t border-gray-100">
            <h3 class="text-2xl font-bold text-indigo-600 mb-6">Core Visualization</h3>
            <div id="visual-content" class="min-h-[300px] flex items-center justify-center bg-gray-50 rounded-2xl p-6 border border-dashed border-gray-200">
              <p class="text-gray-400 italic">Visualization will load here.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Configuration & Data
    const researchSteps = [
      { id: 1, title: "Project Overview", visual: "Intro", isUnlocked: true, content: `<p>Vision begins at the retina. To understand how encoding works, we must understand the signal statistics. Natural scenes are highly structured, but they are also transformed by constant, involuntary eye movements.</p><audio controls class="w-full mt-4"><source src="assets/walkthrough.mp3" type="audio/mp3">Your browser does not support audio.</audio>` },
      { id: 2, title: "Efficient Coding", visual: "Intro", isUnlocked: true, content: `<p>The <b>Efficient Coding Hypothesis</b> suggests neurons maximize information while minimizing biological costs. The retina acts as a filter to remove spatial redundancy.</p><img src="assets/spatial_whitening.png" class="rounded-xl shadow-lg my-4 mx-auto" onerror="this.src='https://placehold.co/600x300?text=Whitening+Diagram';">` },
      { id: 3, title: "The Novel Input: Ocular Drift", visual: "DriftSimulation", isUnlocked: false, content: `<p>Tiny shifts in gaze (drift) transform spatial patterns into temporal fluctuations. The difference image below highlights <b>motion energy</b>.</p>` },
      { id: 4, title: "Drift & Brownian Motion", visual: "TrajectoryDemo", isUnlocked: false, content: `<p>Drift is modeled as <b>2D Brownian Motion</b>. Adjust $D$ to change the "erraticness" of the path.</p>` },
      { id: 5, title: "The Model: Infomax", visual: "Model", isUnlocked: false, content: `<p>We use an Infomax objective to learn optimal filters: $$Maximize\\; I(X;R) - \\lambda\\,Cost(R)$$</p>` },
      { id: 6, title: "Results: RF Transformation", visual: "ResultsSummary", isUnlocked: false, content: `<p>With drift, temporal filters become more <b>bandpass</b> while spatial filters become more <b>lowpass</b>.</p>` },
      { id: 7, title: "Conclusion", visual: "Intro", isUnlocked: false, content: `<p>Ocular drift is an active transformer that retinal encoding must accommodate for optimal information transfer.</p>` }
    ];

    let currentStepId = 1;
    let animId = null, trajId = null;
    const CANVAS_SIZE = 128;
    const TRAJ_SIZE = 256;
    let noiseData = new Float32Array(CANVAS_SIZE * CANVAS_SIZE);
    let lastFrame = null;
    const driftState = { x: 0, y: 0 };
    const trajState = { x: 128, y: 128, history: [] };

    function setHiDPI(canvas, w, h) {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = `${w}px`; canvas.style.height = `${h}px`;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      return ctx;
    }

    function simulationLoop() {
      if (currentStepId !== 3) return;
      const speed = parseFloat(document.getElementById('drift-speed').value);
      driftState.x += (Math.random() - 0.5) * speed;
      driftState.y += (Math.random() - 0.5) * speed;

      const cCurr = document.getElementById('canvas-current');
      const cDiff = document.getElementById('canvas-diff');
      if (cCurr && cDiff) {
        const ctxC = cCurr.getContext('2d');
        const ctxD = cDiff.getContext('2d');
        const currFrame = new Float32Array(CANVAS_SIZE * CANVAS_SIZE);
        
        // Pseudo-drift calculation
        for(let i=0; i<currFrame.length; i++) currFrame[i] = noiseData[(i + Math.floor(driftState.x)) % currFrame.length];

        const img = ctxC.createImageData(CANVAS_SIZE, CANVAS_SIZE);
        for(let i=0; i<currFrame.length; i++){
          const v = currFrame[i]*255;
          const o = i*4; img.data[o]=v; img.data[o+1]=v; img.data[o+2]=v; img.data[o+3]=255;
        }
        ctxC.putImageData(img, 0, 0);

        if(lastFrame) {
          const dImg = ctxD.createImageData(CANVAS_SIZE, CANVAS_SIZE);
          for(let i=0; i<currFrame.length; i++){
            const v = Math.abs(currFrame[i] - lastFrame[i]) * 800;
            const o = i*4; dImg.data[o]=v; dImg.data[o+1]=0; dImg.data[o+2]=0; dImg.data[o+3]=255;
          }
          ctxD.putImageData(dImg, 0, 0);
        }
        lastFrame = currFrame;
      }
      animId = requestAnimationFrame(simulationLoop);
    }

    function trajectoryLoop() {
      if (currentStepId !== 4) return;
      const canvas = document.getElementById('canvas-trajectory');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const D = parseFloat(document.getElementById('diffusion-d').value);
      
      trajState.x += (Math.random() - 0.5) * Math.sqrt(2 * D);
      trajState.y += (Math.random() - 0.5) * Math.sqrt(2 * D);
      trajState.x = Math.max(0, Math.min(TRAJ_SIZE, trajState.x));
      trajState.y = Math.max(0, Math.min(TRAJ_SIZE, trajState.y));
      
      trajState.history.push({x: trajState.x, y: trajState.y});
      if(trajState.history.length > 400) trajState.history.shift();

      ctx.clearRect(0,0,TRAJ_SIZE, TRAJ_SIZE);
      ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2;
      ctx.beginPath();
      trajState.history.forEach((p, i) => { i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
      ctx.stroke();
      trajId = requestAnimationFrame(trajectoryLoop);
    }

    function goToStep(id) {
      currentStepId = id;
      const step = researchSteps.find(s => s.id === id);
      const next = researchSteps.find(s => s.id === id + 1);
      if (next) next.isUnlocked = true;

      document.getElementById('content-title').textContent = step.title;
      document.getElementById('content-display').innerHTML = step.content;
      
      renderVisual(step.visual);
      updateUI(id);
      if (window.MathJax) MathJax.typesetPromise();
    }

    function renderVisual(kind) {
      const host = document.getElementById('visual-content');
      if (kind === "DriftSimulation") {
        host.innerHTML = `<div class="grid grid-cols-2 gap-8 w-full">
          <div class="text-center"><canvas id="canvas-current" width="128" height="128" class="sim-canvas border mx-auto"></canvas><p class="text-xs mt-2 font-semibold">Retinal Input</p></div>
          <div class="text-center"><canvas id="canvas-diff" width="128" height="128" class="sim-canvas border mx-auto"></canvas><p class="text-xs mt-2 font-semibold text-red-600">Temporal Diff</p></div>
        </div>`;
        noiseData = new Float32Array(CANVAS_SIZE*CANVAS_SIZE).map(() => Math.random());
        simulationLoop();
      } else if (kind === "TrajectoryDemo") {
        host.innerHTML = `<canvas id="canvas-trajectory" width="256" height="256" class="sim-canvas mx-auto"></canvas>`;
        trajState.history = [];
        trajectoryLoop();
      } else if (kind === "Model") {
        host.innerHTML = `<img src="assets/single_slide_model_architecture.gif" class="max-w-full rounded-xl shadow-lg">`;
      } else if (kind === "ResultsSummary") {
        host.innerHTML = `<div class="space-y-4 w-full">
          <img src="assets/weights_evolution_video0.gif" class="max-w-full rounded-xl shadow-lg mx-auto">
          <div class="grid grid-cols-2 gap-4">
            <img src="assets/contours_ON_0.gif" class="rounded-lg shadow">
            <img src="assets/contours_OFF_0.gif" class="rounded-lg shadow">
          </div>
        </div>`;
      } else {
        host.innerHTML = `<p class="text-gray-400 italic">Select a simulation step to see active visualizations.</p>`;
      }
    }

    function updateUI(id) {
      // Sidebar Navigation
      const nav = document.getElementById('nav-buttons');
      nav.innerHTML = researchSteps.map(s => {
        const active = s.id === id ? 'bg-indigo-600 text-white shadow-lg scale-[1.02]' : 'bg-gray-100 text-gray-600';
        const disabled = !s.isUnlocked ? 'opacity-40 cursor-not-allowed' : 'hover:bg-indigo-50 hover:text-indigo-700';
        return `<button onclick="${s.isUnlocked ? `goToStep(${s.id})` : ''}" class="nav-button w-full text-left px-4 py-3 rounded-xl font-bold transition-all ${active} ${disabled}">${s.id}. ${s.title}</button>`;
      }).join('');

      // Controls Visibility
      const ctrl = document.getElementById('simulation-controls');
      const speed = document.getElementById('control-drift-speed');
      const alpha = document.getElementById('control-noise-alpha');
      const diff = document.getElementById('control-diffusion-D');
      const tip = document.getElementById('control-tip');

      ctrl.classList.add('hidden');
      [speed, alpha, diff].forEach(el => el.classList.add('hidden'));

      if (id === 3) {
        ctrl.classList.remove('hidden'); speed.classList.remove('hidden'); alpha.classList.remove('hidden');
        tip.textContent = "Drift Speed affects the magnitude of random jitter per frame.";
      } else if (id === 4) {
        ctrl.classList.remove('hidden'); diff.classList.remove('hidden');
        tip.textContent = "D (Diffusion) determines the spread of the random walk over time.";
      }
    }

    // Input listeners for real-time label updates
    document.addEventListener('input', (e) => {
      if (e.target.id === 'drift-speed') document.getElementById('drift-speed-value').textContent = `${e.target.value} px/frame`;
      if (e.target.id === 'noise-alpha') document.getElementById('noise-alpha-value').textContent = e.target.value;
      if (e.target.id === 'diffusion-d') document.getElementById('diffusion-d-value').textContent = e.target.value;
    });

    window.onload = () => goToStep(1);
  </script>
</body>
</html>
